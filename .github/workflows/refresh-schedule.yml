name: Refresh Schedule

on:
  workflow_dispatch:
  schedule:
    # Every Monday and Thursday at 07:05 AM Mountain Time (13:05 UTC)
    - cron: '5 13 * * 1,4'

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -q requests beautifulsoup4 lxml

      - name: Scrape and render
        run: |
          mkdir -p docs
          python3 << 'PYSCRIPT'
          import requests
          from bs4 import BeautifulSoup
          import datetime
          import re
          import html as html_escape
          import json
          import time
          import os
          
          # =====================================================
          # CONFIG
          # =====================================================
          BASE_URL = "https://looknbook.reddeer.ca/RedDeer/public/Category/ClassList"
          GUIDS = {
              "swim": "09d0604f-a42d-43a3-a93c-64a93ebda20c",
              "skate": "6f659e94-7b6a-4042-8c63-fbeba072256d",
              "climb": "654b289b-816d-443f-a84f-8f0cae322e54"
          }
          SPORT_EMOJI = {"swim": "🏊", "skate": "⛸️", "climb": "🧗"}
          SPORT_LABEL = {"swim": "Swimming", "skate": "Skating / Arena", "climb": "Climbing & Bouldering"}
          SPORT_LABEL_ZH = {"swim": "游泳", "skate": "冰场", "climb": "攀岩"}
          
          FACILITY_CODES = {
              "Collicutt Centre": ("CC", "Collicutt"),
              "Don Moore Recreation Centre": ("RC", "Don Moore<br>Recreation"),
              "Michener Aquatic Centre": ("MC", "Michener<br>Aquatic"),
              "G.H. Dawe Community Centre": ("DC", "G.H. Dawe<br>Community"),
              "Servus Arena": ("SA", "Servus<br>Arena"),
          }
          # Fail-safe thresholds
          MAX_TOTAL_SECONDS = 300  # 5 minutes
          MAX_CONSECUTIVE_FAILURES = 5
          MAX_FAILURE_RATIO = 0.30
          RETRY_ATTEMPTS = 2
          RETRY_BACKOFF = [2, 4]  # seconds
          REQUEST_INTERVAL = 1.0  # seconds between requests
          REQUEST_TIMEOUT = 15  # seconds per attempt
          CACHE_MAX_AGE_DAYS = 7
          
          BROWSER_HEADERS = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36",
              "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8",
              "Accept-Language": "en-US,en;q=0.9",
              "Accept-Encoding": "gzip, deflate, br",
              "Connection": "keep-alive",
              "Upgrade-Insecure-Requests": "1",
          }
          
          CACHE_FILE = "docs/sessions_cache.json"
          GITHUB_REPO_URL = "https://github.com/lxyzh1019-cyber/RD-Facility-Sch"
          
          # =====================================================
          # SESSION CLASS
          # =====================================================
          def get_facility_code(venue):
              clean = re.sub(r'^(Leisure Centres|Arenas)\s*-\s*', '', venue).strip()
              for key, (code, name) in FACILITY_CODES.items():
                  if key in clean:
                      return code, name, clean
              words = clean.split()
              if len(words) >= 2:
                  code = (words[0][0] + words[1][0]).upper()
              else:
                  code = (clean[:2] or "XX").upper()
              return code, clean, clean
          
          def parse_time_to_min(t):
              if not t: return 0
              m = re.search(r'(\d+):(\d+)', t)
              if not m: return 0
              h, mn = int(m.group(1)), int(m.group(2))
              if 'PM' in t and h != 12: h += 12
              if 'AM' in t and h == 12: h = 0
              return h * 60 + mn
          
          def duration_str(start_t, end_t):
              mins = parse_time_to_min(end_t) - parse_time_to_min(start_t)
              if mins <= 0: return "—"
              if mins < 60: return f"{mins} min"
              hrs = mins / 60
              if hrs == int(hrs): return f"{int(hrs)} hr{'s' if hrs > 1 else ''}"
              return f"{hrs:.1f} hrs"
          
          def short_name(n):
              n = n.replace("Drop-in", "").replace("Drop-In", "").strip()
              if len(n) > 22:
                  n = n[:20] + "..."
              return n
          
          # Session represented as dict for easy JSON serialization
          def make_session(date, domain, name, time_raw, location, venue, spaces):
              parts = re.split(r'\s*[-–]\s*', time_raw.split('(')[0].strip(), maxsplit=1)
              start_time = parts[0].strip() if len(parts) > 0 else ""
              end_time = parts[1].strip() if len(parts) > 1 else ""
              return {
                  "date": date,
                  "domain": domain,
                  "name": name,
                  "location": location,
                  "venue": venue,
                  "spaces": spaces,
                  "start_time": start_time,
                  "end_time": end_time,
                  "conflicts": []
              }
          
          # =====================================================
          # LOAD CACHE
          # =====================================================
          cache = {"days": {}, "last_updated": {}}
          if os.path.exists(CACHE_FILE):
              try:
                  with open(CACHE_FILE, 'r', encoding='utf-8') as f:
                      cache = json.load(f)
                  print(f"[cache] Loaded {len(cache.get('days', {}))} cached days")
              except Exception as e:
                  print(f"[cache] Failed to load: {e} — starting fresh")
                  cache = {"days": {}, "last_updated": {}}
          else:
              print("[cache] No existing cache, starting fresh")
          
          # =====================================================
          # SCRAPE WITH RETRY + FAIL-SAFES
          # =====================================================
          session_obj = requests.Session()
          session_obj.headers.update(BROWSER_HEADERS)
          
          fresh_days = {}  # {date: [sessions]}
          fetch_status = {}  # {date: "fresh" | "cached" | "failed"}
          
          total_requests = 0
          total_failures = 0
          consecutive_failures = 0
          start_time_ts = time.time()
          aborted = False
          abort_reason = None
          
          today_iso = datetime.date.today().isoformat()
          dates_to_fetch = [(datetime.date.today() + datetime.timedelta(days=i)).isoformat() for i in range(14)]
          
          # Initialize fresh_days structure
          for d in dates_to_fetch:
              fresh_days[d] = []
          
          # Fetch order: day-by-day, all sports per day (minimizes gap if we abort mid-way)
          for d in dates_to_fetch:
              if aborted: break
              
              day_success = True
              for domain, guid in GUIDS.items():
                  # Check fail-safes
                  elapsed = time.time() - start_time_ts
                  if elapsed > MAX_TOTAL_SECONDS:
                      aborted = True
                      abort_reason = f"Time limit exceeded ({elapsed:.0f}s > {MAX_TOTAL_SECONDS}s)"
                      print(f"[abort] {abort_reason}")
                      break
                  if consecutive_failures >= MAX_CONSECUTIVE_FAILURES:
                      aborted = True
                      abort_reason = f"Too many consecutive failures ({consecutive_failures})"
                      print(f"[abort] {abort_reason}")
                      break
                  if total_requests >= 10 and (total_failures / total_requests) > MAX_FAILURE_RATIO:
                      aborted = True
                      abort_reason = f"Failure ratio too high ({total_failures}/{total_requests})"
                      print(f"[abort] {abort_reason}")
                      break
                  
                  url = f"{BASE_URL}?CategoryGUID={guid}&StartDate={d}&Participant=00000000-0000-0000-0000-000000000000"
                  
                  # Retry loop
                  success = False
                  last_error = None
                  for attempt in range(RETRY_ATTEMPTS + 1):
                      total_requests += 1
                      try:
                          r = session_obj.get(url, timeout=REQUEST_TIMEOUT)
                          r.raise_for_status()
                          soup = BeautifulSoup(r.text, 'lxml')
                          table = soup.find('table')
                          if table:
                              for tr in table.find_all('tr')[1:]:
                                  cells = tr.find_all('td')
                                  if len(cells) < 7: continue
                                  time_raw = cells[0].text.strip()
                                  name = cells[1].text.strip()
                                  location = cells[3].text.strip()
                                  venue = cells[4].text.strip()
                                  spaces = cells[5].text.strip()
                                  if domain == "swim" and "swim" not in name.lower():
                                      continue
                                  fresh_days[d].append(make_session(d, domain, name, time_raw, location, venue, spaces))
                          success = True
                          consecutive_failures = 0
                          break
                      except Exception as e:
                          last_error = e
                          if attempt < RETRY_ATTEMPTS:
                              backoff = RETRY_BACKOFF[attempt] if attempt < len(RETRY_BACKOFF) else RETRY_BACKOFF[-1]
                              time.sleep(backoff)
                  
                  if not success:
                      total_failures += 1
                      consecutive_failures += 1
                      day_success = False
                      print(f"[fail] {domain} {d}: {last_error}")
                  
                  time.sleep(REQUEST_INTERVAL)
              
              if not aborted and day_success:
                  fetch_status[d] = "fresh"
              elif not aborted and not day_success and len(fresh_days[d]) > 0:
                  fetch_status[d] = "partial"
              elif not aborted:
                  fetch_status[d] = "failed"
          
          # Mark all un-fetched days (due to abort) as failed
          for d in dates_to_fetch:
              if d not in fetch_status:
                  fetch_status[d] = "failed"
          
          print(f"[stats] Requests: {total_requests}, Failures: {total_failures}, Aborted: {aborted}")
          
          # =====================================================
          # MERGE FRESH + CACHE
          # =====================================================
          final_days = {}  # {date: [sessions]}
          day_staleness = {}  # {date: "fresh" | "cached:YYYY-MM-DD" | "unavailable"}
          
          cached_days = cache.get("days", {})
          cached_updated = cache.get("last_updated", {})
          
          today_date = datetime.date.today()
          
          for d in dates_to_fetch:
              status = fetch_status.get(d, "failed")
              
              if status in ("fresh", "partial") and len(fresh_days[d]) > 0:
                  # Use fresh data
                  final_days[d] = fresh_days[d]
                  day_staleness[d] = "fresh"
                  # Update cache
                  cached_days[d] = fresh_days[d]
                  cached_updated[d] = today_iso
              elif d in cached_days:
                  # Use cached data if within 7-day limit
                  last_date_str = cached_updated.get(d, "1970-01-01")
                  try:
                      last_date = datetime.date.fromisoformat(last_date_str)
                      age_days = (today_date - last_date).days
                  except Exception:
                      age_days = 999
                  
                  if age_days <= CACHE_MAX_AGE_DAYS:
                      final_days[d] = cached_days[d]
                      day_staleness[d] = f"cached:{last_date_str}"
                  else:
                      final_days[d] = []
                      day_staleness[d] = "unavailable"
              else:
                  # No fresh, no cache
                  final_days[d] = []
                  day_staleness[d] = "unavailable"
          
          # Clean up old cache entries (remove dates that are in the past or beyond our window)
          valid_cache_dates = set(dates_to_fetch)
          cached_days = {k: v for k, v in cached_days.items() if k in valid_cache_dates}
          cached_updated = {k: v for k, v in cached_updated.items() if k in valid_cache_dates}
          
          # Save updated cache
          new_cache = {"days": cached_days, "last_updated": cached_updated}
          with open(CACHE_FILE, 'w', encoding='utf-8') as f:
              json.dump(new_cache, f, ensure_ascii=False, indent=2)
          
          # =====================================================
          # CONFLICT DETECTION (cross-sport at same facility)
          # =====================================================
          for d, sessions in final_days.items():
              for i, a in enumerate(sessions):
                  for b in sessions[i+1:]:
                      if a["domain"] == b["domain"]: continue
                      code_a, _, _ = get_facility_code(a["venue"])
                      code_b, _, _ = get_facility_code(b["venue"])
                      if code_a != code_b: continue
                      
                      a_s, a_e = parse_time_to_min(a["start_time"]), parse_time_to_min(a["end_time"])
                      b_s, b_e = parse_time_to_min(b["start_time"]), parse_time_to_min(b["end_time"])
                      
                      if a_e <= b_s:
                          gap = b_s - a_e
                      elif b_e <= a_s:
                          gap = a_s - b_e
                      else:
                          gap = -(min(a_e, b_e) - max(a_s, b_s))
                      
                      if gap > 30: continue
                      a["conflicts"].append(f"{SPORT_EMOJI[b['domain']]} {short_name(b['name'])} ({b['start_time']} – {b['end_time']})")
                      b["conflicts"].append(f"{SPORT_EMOJI[a['domain']]} {short_name(a['name'])} ({a['start_time']} – {a['end_time']})")
          
          # =====================================================
          # HTML GENERATION
          # =====================================================
          generated_at = datetime.datetime.now().strftime("%Y-%m-%d %H:%M")
          
          # Calculate overall freshness
          fresh_count = sum(1 for s in day_staleness.values() if s == "fresh")
          cached_count = sum(1 for s in day_staleness.values() if s.startswith("cached"))
          unavailable_count = sum(1 for s in day_staleness.values() if s == "unavailable")
          total_days = len(day_staleness)
          
          # Find oldest cached date
          oldest_cache_date = None
          for d, s in day_staleness.items():
              if s.startswith("cached:"):
                  cd = s.split(":", 1)[1]
                  if oldest_cache_date is None or cd < oldest_cache_date:
                      oldest_cache_date = cd
          
          banner = ""
          if cached_count > 0 or unavailable_count > 0:
              parts = []
              if cached_count > 0:
                  parts.append(f"{cached_count} day(s) using cached data" + (f" (oldest from {oldest_cache_date})" if oldest_cache_date else ""))
              if unavailable_count > 0:
                  parts.append(f"{unavailable_count} day(s) unavailable")
              banner = f'<div class="banner">⚠️ {" · ".join(parts)}. Last successful refresh attempt: {generated_at}</div>'
          
          html = '''<!doctype html>
          <html lang="en">
          <head>
          <meta charset="utf-8">
          <meta name="viewport" content="width=device-width, initial-scale=1">
          <title>Red Deer Drop-In Schedule</title>
          <style>
          :root {
            --bg: #0f172a; --panel: #1e293b; --panel-2: #0b1222; --panel-3: #162033;
            --text: #e2e8f0; --muted: #94a3b8; --border: #334155; --border-strong: #64748b;
            --accent: #38bdf8;
            --swim: #2563eb; --skate: #0891b2; --climb: #ca8a04;
            --conflict: #ef4444; --warn: #f59e0b; --fresh: #22c55e;
            --fac-CC: #a855f7; --fac-RC: #34d399; --fac-MC: #fb7185; --fac-DC: #fb923c; --fac-SA: #818cf8; --fac-unknown: #64748b;
          }
          * { box-sizing: border-box; }
          html, body { margin: 0; padding: 0; }
          body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); font-size: 15px; }
          header { padding: 14px 20px; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; gap: 16px; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 200; box-shadow: 0 2px 8px rgba(0,0,0,0.4); flex-wrap: wrap; }
          header h1 { margin: 0; font-size: 17px; }
          header .meta { color: var(--muted); font-size: 12px; }
          .chip { padding: 8px 14px; border-radius: 999px; border: 1px solid var(--border); background: var(--panel-2); color: var(--text); font-size: 13px; cursor: pointer; user-select: none; font-weight: 500; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; }
          .chip.active { background: var(--accent); color: #0b1222; border-color: var(--accent); }
          .chip.refresh { background: var(--fresh); color: #0b1222; border-color: var(--fresh); font-weight: 700; }
          .chip.refresh:hover { background: #16a34a; }
          .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
          #gantt-facility-select { padding: 8px 12px; border-radius: 999px; border: 1px solid var(--border); background: var(--panel-2); color: var(--text); font-size: 13px; font-weight: 500; cursor: pointer; max-width: 200px; }
          
          .banner { background: rgba(245,158,11,0.15); border-bottom: 1px solid var(--warn); color: var(--warn); padding: 10px 20px; font-size: 13px; font-weight: 500; text-align: center; }
          
          main { padding: 20px; }
          .view { display: none; }
          .view.active { display: block; }
          
          /* Staleness badge */
          .stale-badge { display: inline-block; margin-left: 8px; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
          .stale-badge.fresh { background: rgba(34,197,94,0.2); color: var(--fresh); border: 1px solid var(--fresh); }
          .stale-badge.cached { background: rgba(245,158,11,0.2); color: var(--warn); border: 1px solid var(--warn); }
          .stale-badge.unavailable { background: rgba(239,68,68,0.2); color: var(--conflict); border: 1px solid var(--conflict); }
          
          /* List View */
          .day { margin-bottom: 20px; background: var(--panel); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
          .day-head { padding: 10px 16px; background: var(--panel-2); border-bottom: 1px solid var(--border); font-weight: 600; font-size: 15px; }
          .domain-row { display: grid; grid-template-columns: 150px 1fr; border-top: 1px solid var(--border); }
          .domain-row:first-child { border-top: none; }
          .domain-label { padding: 12px 16px; background: var(--panel-2); font-size: 13px; font-weight: 600; display: flex; flex-direction: column; gap: 2px; justify-content: center; border-right: 1px solid var(--border); }
          .domain-label .zh { font-size: 11px; color: var(--muted); font-weight: 400; }
          .domain-label.swim { border-left: 3px solid var(--swim); }
          .domain-label.skate { border-left: 3px solid var(--skate); }
          .domain-label.climb { border-left: 3px solid var(--climb); }
          .sessions-flex { padding: 10px; display: flex; flex-wrap: wrap; gap: 8px; min-height: 48px; align-items: flex-start; }
          .session { display: flex; flex-direction: column; gap: 2px; padding: 8px 10px; border-radius: 6px; background: var(--panel-2); border: 1px solid var(--border); border-left-width: 3px; font-size: 12.5px; min-width: 220px; max-width: 320px; }
          .session.swim { border-left-color: var(--swim); }
          .session.skate { border-left-color: var(--skate); }
          .session.climb { border-left-color: var(--climb); }
          .session .time { font-weight: 600; }
          .session .name { color: var(--muted); font-size: 11.5px; }
          .session .loc { color: var(--text); font-size: 11.5px; opacity: 0.85; }
          .empty { color: var(--muted); font-style: italic; font-size: 12px; padding: 4px 6px; }
          .unavailable-msg { padding: 20px; text-align: center; color: var(--conflict); font-size: 13px; font-weight: 500; }
          
          /* Gantt View */
          .gantt-day { margin-bottom: 24px; background: var(--panel); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
          .gantt-day-title { font-weight: 700; font-size: 16px; padding: 12px 18px; background: var(--panel-2); border-bottom: 1px solid var(--border); display: flex; align-items: center; }
          .gantt-day-title.today { background: linear-gradient(90deg, rgba(56,189,248,0.25), var(--panel-2)); }
          .gantt-day-title.weekend { background: linear-gradient(90deg, rgba(234,179,8,0.15), var(--panel-2)); }
          
          .chart-scroll { position: relative; overflow-x: auto; }
          .chart-grid { display: grid; grid-template-columns: 160px repeat(16, 70px); min-width: 1280px; }
          
          .time-cell { background: var(--panel-3); border-bottom: 2px solid var(--border-strong); border-right: 1px solid var(--border); padding: 8px 0; text-align: center; font-size: 12px; font-weight: 700; color: var(--muted); }
          .time-cell.corner { border-right: 2px solid var(--border-strong); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
          
          .facility-label { background: var(--panel-2); border-right: 2px solid var(--border-strong); border-bottom: 3px solid var(--border-strong); padding: 0 12px; display: flex; gap: 8px; align-items: center; justify-content: flex-start; border-left: 3px solid var(--fac-unknown); }
          .facility-label .code { flex-shrink: 0; background: var(--fac-unknown); color: #0b1222; padding: 3px 7px; border-radius: 4px; font-size: 11px; font-weight: 800; letter-spacing: 0.5px; min-width: 32px; text-align: center; }
          .facility-label .name { font-size: 12px; color: var(--text); line-height: 1.3; font-weight: 500; }
          .facility-label[data-facility="CC"] { border-left-color: var(--fac-CC); }
          .facility-label[data-facility="CC"] .code { background: var(--fac-CC); }
          .facility-label[data-facility="RC"] { border-left-color: var(--fac-RC); }
          .facility-label[data-facility="RC"] .code { background: var(--fac-RC); }
          .facility-label[data-facility="MC"] { border-left-color: var(--fac-MC); }
          .facility-label[data-facility="MC"] .code { background: var(--fac-MC); }
          .facility-label[data-facility="DC"] { border-left-color: var(--fac-DC); }
          .facility-label[data-facility="DC"] .code { background: var(--fac-DC); }
          .facility-label[data-facility="SA"] { border-left-color: var(--fac-SA); }
          .facility-label[data-facility="SA"] .code { background: var(--fac-SA); }
          
          .bars-row { position: relative; height: 48px; background-color: var(--panel); background-image: repeating-linear-gradient(to right, transparent 0, transparent 69px, var(--border) 69px, var(--border) 70px); display: flex; align-items: center; }
          .bars-row[data-facility="CC"] { background-image: linear-gradient(to right, color-mix(in srgb, var(--fac-CC) 14%, transparent), color-mix(in srgb, var(--fac-CC) 14%, transparent)), repeating-linear-gradient(to right, transparent 0, transparent 69px, var(--border) 69px, var(--border) 70px); }
          .bars-row[data-facility="RC"] { background-image: linear-gradient(to right, color-mix(in srgb, var(--fac-RC) 14%, transparent), color-mix(in srgb, var(--fac-RC) 14%, transparent)), repeating-linear-gradient(to right, transparent 0, transparent 69px, var(--border) 69px, var(--border) 70px); }
          .bars-row[data-facility="MC"] { background-image: linear-gradient(to right, color-mix(in srgb, var(--fac-MC) 14%, transparent), color-mix(in srgb, var(--fac-MC) 14%, transparent)), repeating-linear-gradient(to right, transparent 0, transparent 69px, var(--border) 69px, var(--border) 70px); }
          .bars-row[data-facility="DC"] { background-image: linear-gradient(to right, color-mix(in srgb, var(--fac-DC) 14%, transparent), color-mix(in srgb, var(--fac-DC) 14%, transparent)), repeating-linear-gradient(to right, transparent 0, transparent 69px, var(--border) 69px, var(--border) 70px); }
          .bars-row[data-facility="SA"] { background-image: linear-gradient(to right, color-mix(in srgb, var(--fac-SA) 14%, transparent), color-mix(in srgb, var(--fac-SA) 14%, transparent)), repeating-linear-gradient(to right, transparent 0, transparent 69px, var(--border) 69px, var(--border) 70px); }
          .bars-row[data-facility]:not([data-facility="CC"]):not([data-facility="RC"]):not([data-facility="MC"]):not([data-facility="DC"]):not([data-facility="SA"]) { background-image: linear-gradient(to right, color-mix(in srgb, var(--fac-unknown) 14%, transparent), color-mix(in srgb, var(--fac-unknown) 14%, transparent)), repeating-linear-gradient(to right, transparent 0, transparent 69px, var(--border) 69px, var(--border) 70px); }
          .bars-row.facility-last { border-bottom: 3px solid var(--border-strong); }
          .bars-row.sub-2 { height: 80px; }
          .bars-row.sub-3 { height: 112px; }
          
          .bar { position: absolute; height: 32px; top: 50%; transform: translateY(-50%); border-radius: 5px; border: 2px solid rgba(255,255,255,0.15); display: flex; align-items: center; padding: 0 7px; font-size: 12px; color: white; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; transition: transform 100ms ease, box-shadow 100ms ease; gap: 4px; }
          .bar:hover { transform: translateY(-50%) translateY(-1px); box-shadow: 0 3px 10px rgba(0,0,0,0.4); z-index: 5; }
          .bar.swim { background: var(--swim); }
          .bar.skate { background: var(--skate); }
          .bar.climb { background: var(--climb); }
          .bar.conflict { border-color: var(--conflict) !important; box-shadow: 0 0 0 2px rgba(239,68,68,0.55); }
          
          .bar .emoji { font-size: 14px; }
          .bar .bar-time { font-size: 11px; opacity: 0.9; font-weight: 600; }
          .bar .bar-name { font-size: 11.5px; font-weight: 600; }
          
          .bars-row.sub-2 .bar { top: 8px; transform: none; }
          .bars-row.sub-2 .bar:hover { top: 7px; transform: none; }
          .bars-row.sub-2 .bar.row-2 { top: 40px; }
          .bars-row.sub-2 .bar.row-2:hover { top: 39px; }
          .bars-row.sub-3 .bar { top: 8px; transform: none; }
          .bars-row.sub-3 .bar.row-2 { top: 40px; }
          .bars-row.sub-3 .bar.row-3 { top: 72px; }
          
          /* Popup */
          .popup-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 500; align-items: center; justify-content: center; padding: 20px; }
          .popup-overlay.active { display: flex; }
          .popup { background: var(--panel); border: 1px solid var(--border-strong); border-radius: 12px; padding: 24px; max-width: 420px; width: 100%; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
          .popup-sport { font-size: 20px; font-weight: 700; color: var(--accent); margin-bottom: 12px; }
          .popup-row { display: flex; gap: 10px; margin-bottom: 10px; font-size: 14px; line-height: 1.4; }
          .popup-row .label { color: var(--muted); min-width: 80px; font-weight: 600; }
          .popup-row .value { color: var(--text); flex: 1; }
          .popup-row .value.time { color: #fcd34d; font-weight: 700; font-size: 15px; }
          .popup-conflict { margin-top: 16px; padding: 10px 12px; background: rgba(239,68,68,0.15); border: 1px solid var(--conflict); border-radius: 6px; font-size: 13px; color: var(--conflict); font-weight: 600; line-height: 1.5; }
          .popup-close { margin-top: 18px; padding: 10px 20px; background: var(--accent); color: #0b1222; border: none; border-radius: 6px; font-size: 14px; font-weight: 700; cursor: pointer; width: 100%; }
          
          footer { padding: 14px 20px; color: var(--muted); font-size: 12px; border-top: 1px solid var(--border); }
          
          body.hide-swim .bar.swim, body.hide-swim .domain-row.swim { display: none; }
          body.hide-skate .bar.skate, body.hide-skate .domain-row.skate { display: none; }
          body.hide-climb .bar.climb, body.hide-climb .domain-row.climb { display: none; }
          
          body[data-gantt-fac="CC"] #gantt-view .facility-label:not([data-facility="CC"]),
          body[data-gantt-fac="CC"] #gantt-view .bars-row:not([data-facility="CC"]) { display: none !important; }
          body[data-gantt-fac="RC"] #gantt-view .facility-label:not([data-facility="RC"]),
          body[data-gantt-fac="RC"] #gantt-view .bars-row:not([data-facility="RC"]) { display: none !important; }
          body[data-gantt-fac="MC"] #gantt-view .facility-label:not([data-facility="MC"]),
          body[data-gantt-fac="MC"] #gantt-view .bars-row:not([data-facility="MC"]) { display: none !important; }
          body[data-gantt-fac="DC"] #gantt-view .facility-label:not([data-facility="DC"]),
          body[data-gantt-fac="DC"] #gantt-view .bars-row:not([data-facility="DC"]) { display: none !important; }
          body[data-gantt-fac="SA"] #gantt-view .facility-label:not([data-facility="SA"]),
          body[data-gantt-fac="SA"] #gantt-view .bars-row:not([data-facility="SA"]) { display: none !important; }
          </style>
          </head>
          <body>
          <header>
          <div style="flex: 1;">
          <h1>Red Deer Drop-In Schedule · 红鹿市时间表</h1>
          <div class="meta">Last updated: ''' + generated_at + ''' · ''' + str(fresh_count) + '''/''' + str(total_days) + ''' days fresh</div>
          </div>
          <div style="display: flex; gap: 8px; flex-wrap: wrap;">
          <a class="chip refresh" href="''' + GITHUB_REPO_URL + '''/actions/workflows/refresh-schedule.yml" target="_blank" title="Opens GitHub Actions - click Run workflow">🔄 Refresh</a>
          <button class="chip active" data-view="list">📋 List</button>
          <button class="chip" data-view="gantt">📊 Gantt</button>
          <label class="sr-only" for="gantt-facility-select">Facility (Gantt)</label>
          <select id="gantt-facility-select" title="Show one facility in Gantt view" aria-label="Filter Gantt by facility">
          <option value="all" selected>All facilities</option>
          <option value="CC">Collicutt (CC)</option>
          <option value="RC">Don Moore (RC)</option>
          <option value="MC">Michener (MC)</option>
          <option value="DC">G.H. Dawe (DC)</option>
          <option value="SA">Servus Arena (SA)</option>
          </select>
          <button class="chip active" data-toggle="swim">🏊 Swim</button>
          <button class="chip active" data-toggle="skate">⛸️ Skate</button>
          <button class="chip active" data-toggle="climb">🧗 Climb</button>
          </div>
          </header>
          ''' + banner + '''
          <main>
          
          <!-- LIST VIEW -->
          <div id="list-view" class="view active">
          '''
          
          for d in dates_to_fetch:
              day_obj = datetime.datetime.fromisoformat(d).date()
              day_label = day_obj.strftime("%a, %b %d, %Y")
              is_today = (d == today_iso)
              stale = day_staleness.get(d, "unavailable")
              
              badge = ""
              if stale == "fresh":
                  badge = '<span class="stale-badge fresh">✅ Fresh</span>'
              elif stale.startswith("cached:"):
                  cdate = stale.split(":", 1)[1]
                  badge = f'<span class="stale-badge cached">📦 Cached {cdate}</span>'
              else:
                  badge = '<span class="stale-badge unavailable">⚠️ Unavailable</span>'
              
              html += f'<section class="day"><div class="day-head">{"📍 " if is_today else ""}{day_label}{" · Today" if is_today else ""}{badge}</div>'
              
              if stale == "unavailable":
                  html += '<div class="unavailable-msg">Schedule data unavailable for this day. Try refreshing.</div>'
              else:
                  by_domain = {"swim": [], "skate": [], "climb": []}
                  for s in final_days[d]:
                      by_domain[s["domain"]].append(s)
                  
                  for domain in ["swim", "skate", "climb"]:
                      items = by_domain[domain]
                      if items:
                          cards = ""
                          for s in items:
                              cards += f'<div class="session {domain}"><span class="time">{s["start_time"]} – {s["end_time"]}</span><span class="name">{html_escape.escape(s["name"])}</span><span class="loc">📍 {html_escape.escape(s["location"])}</span></div>'
                      else:
                          cards = '<span class="empty">— no sessions —</span>'
                      html += f'<div class="domain-row {domain}"><div class="domain-label {domain}"><span>{SPORT_LABEL[domain]}</span><span class="zh">{SPORT_LABEL_ZH[domain]}</span></div><div class="sessions-flex">{cards}</div></div>'
              
              html += '</section>'
          
          html += '''</div>
          
          <!-- GANTT VIEW -->
          <div id="gantt-view" class="view">
          '''
          
          for d in dates_to_fetch:
              day_obj = datetime.datetime.fromisoformat(d).date()
              day_label = day_obj.strftime("%a, %b %d, %Y")
              is_today = (d == today_iso)
              is_weekend = day_obj.weekday() >= 5
              stale = day_staleness.get(d, "unavailable")
              
              title_class = "today" if is_today else ("weekend" if is_weekend else "")
              
              badge = ""
              if stale == "fresh":
                  badge = '<span class="stale-badge fresh">✅ Fresh</span>'
              elif stale.startswith("cached:"):
                  cdate = stale.split(":", 1)[1]
                  badge = f'<span class="stale-badge cached">📦 Cached {cdate}</span>'
              else:
                  badge = '<span class="stale-badge unavailable">⚠️ Unavailable</span>'
              
              html += f'<div class="gantt-day"><div class="gantt-day-title {title_class}"><span>📅 {day_label}{" · Today" if is_today else ""}</span>{badge}</div>'
              
              if stale == "unavailable":
                  html += '<div class="unavailable-msg">Schedule data unavailable for this day. Try refreshing.</div>'
              else:
                  html += '<div class="chart-scroll"><div class="chart-grid">'
                  html += '<div class="time-cell corner">Facility</div>'
                  for hour in range(6, 22):
                      period = "AM" if hour < 12 else "PM"
                      display_hour = hour if hour <= 12 else hour - 12
                      html += f'<div class="time-cell">{display_hour} {period}</div>'
                  
                  # Group by facility → sport
                  facility_groups = {}
                  for s in final_days[d]:
                      code, fac_name, _ = get_facility_code(s["venue"])
                      if code not in facility_groups:
                          facility_groups[code] = {"name": fac_name, "sports": {}}
                      if s["domain"] not in facility_groups[code]["sports"]:
                          facility_groups[code]["sports"][s["domain"]] = []
                      facility_groups[code]["sports"][s["domain"]].append(s)
                  
                  if not facility_groups:
                      html += '<div style="grid-column: 1 / -1; padding: 20px; text-align: center; color: var(--muted);">No sessions this day</div>'
                  
                  for code in sorted(facility_groups.keys()):
                      fg = facility_groups[code]
                      sport_list = [sp for sp in ["swim", "skate", "climb"] if sp in fg["sports"]]
                      num_sports = len(sport_list)
                      
                      html += f'<div class="facility-label" data-facility="{code}" style="grid-row: span {num_sports};"><span class="code">{code}</span><span class="name">{fg["name"]}</span></div>'
                      
                      for idx, sport in enumerate(sport_list):
                          sessions = fg["sports"][sport]
                          is_last = (idx == num_sports - 1)
                          last_cls = " facility-last" if is_last else ""
                          
                          unique_locations = sorted(set(s["location"] for s in sessions))
                          num_sub_rows = len(unique_locations)
                          sub_cls = ""
                          if num_sub_rows == 2: sub_cls = " sub-2"
                          elif num_sub_rows >= 3: sub_cls = " sub-3"
                          
                          html += f'<div class="bars-row{sub_cls}{last_cls}" data-facility="{code}" style="grid-column: 2 / span 16;">'
                          
                          loc_to_row = {loc: i for i, loc in enumerate(unique_locations)}
                          
                          for s in sessions:
                              start = parse_time_to_min(s["start_time"])
                              end = parse_time_to_min(s["end_time"])
                              if start == 0 or end == 0: continue
                              
                              left_px = ((start - 360) / 60) * 70
                              width_px = ((end - start) / 60) * 70
                              
                              if width_px < 30: width_px = 30  # minimum clickable width
                              if left_px < 0: left_px = 0
                              
                              conflict_cls = " conflict" if s.get("conflicts") else ""
                              
                              row_cls = ""
                              if num_sub_rows >= 2:
                                  row_idx = loc_to_row[s["location"]]
                                  if row_idx == 1: row_cls = " row-2"
                                  elif row_idx == 2: row_cls = " row-3"
                              
                              popup_data = {
                                  "sport": f"{SPORT_EMOJI[s['domain']]} {s['name']}",
                                  "time": f"{s['start_time']} – {s['end_time']}",
                                  "duration": duration_str(s["start_time"], s["end_time"]),
                                  "facility": fg["name"].replace("<br>", " "),
                                  "pool": s["location"],
                                  "date": day_label
                              }
                              if s.get("conflicts"):
                                  popup_data["conflict"] = "Overlaps with: " + "; ".join(s["conflicts"][:3])
                              
                              popup_json = html_escape.escape(json.dumps(popup_data), quote=True)
                              short = html_escape.escape(short_name(s["name"]))
                              time_display = s["start_time"].replace(" ", "").replace(":00", "")
                              
                              html += f'<div class="bar {s["domain"]}{conflict_cls}{row_cls}" data-popup="{popup_json}" style="left: {left_px:.0f}px; width: {width_px:.0f}px;">'
                              html += f'<span class="emoji">{SPORT_EMOJI[s["domain"]]}</span><span class="bar-time">{time_display}</span><span class="bar-name">{short}</span>'
                              html += '</div>'
                          
                          html += '</div>'
                  
                  html += '</div></div>'
              
              html += '</div>'
          
          html += '''</div>
          </main>
          
          <div class="popup-overlay" id="popup">
            <div class="popup" onclick="event.stopPropagation()">
              <div class="popup-sport" id="popup-sport"></div>
              <div class="popup-row"><span class="label">⏰ Time</span><span class="value time" id="popup-time"></span></div>
              <div class="popup-row"><span class="label">⏱ Length</span><span class="value" id="popup-duration"></span></div>
              <div class="popup-row"><span class="label">📍 Where</span><span class="value" id="popup-facility"></span></div>
              <div class="popup-row"><span class="label" id="popup-area-label">🏊 Pool</span><span class="value" id="popup-pool"></span></div>
              <div class="popup-row"><span class="label">📅 Date</span><span class="value" id="popup-date"></span></div>
              <div class="popup-conflict" id="popup-conflict" style="display:none"></div>
              <button class="popup-close" onclick="closePopup()">Close / 关闭</button>
            </div>
          </div>
          
          <footer>
            🏊 Swim · ⛸️ Skate · 🧗 Climb · ⚠️ Red border = conflict at same facility · Tap any bar for details.<br>
            Auto-refresh runs Mon & Thu at 7:05 AM. Click 🔄 Refresh button for manual update.
          </footer>
          
          <script>
          document.querySelectorAll('[data-view]').forEach(function(btn) {
            btn.onclick = function() {
              const view = btn.dataset.view;
              document.querySelectorAll('[data-view]').forEach(function(b) { b.classList.remove('active'); });
              btn.classList.add('active');
              document.querySelectorAll('.view').forEach(function(v) { v.classList.remove('active'); });
              document.getElementById(view + '-view').classList.add('active');
            };
          });
          
          (function() {
            var facSel = document.getElementById('gantt-facility-select');
            if (!facSel) return;
            function applyGanttFacilityFilter() {
              var v = facSel.value;
              if (v === 'all') document.body.removeAttribute('data-gantt-fac');
              else document.body.setAttribute('data-gantt-fac', v);
            }
            facSel.addEventListener('change', applyGanttFacilityFilter);
            applyGanttFacilityFilter();
          })();
          
          document.querySelectorAll('[data-toggle]').forEach(function(btn) {
            btn.onclick = function() {
              const key = btn.dataset.toggle;
              btn.classList.toggle('active');
              document.body.classList.toggle('hide-' + key, !btn.classList.contains('active'));
            };
          });
          
          document.querySelectorAll('.bar').forEach(function(bar) {
            bar.onclick = function() {
              const data = JSON.parse(bar.dataset.popup);
              document.getElementById('popup-sport').textContent = data.sport;
              document.getElementById('popup-time').textContent = data.time;
              document.getElementById('popup-duration').textContent = data.duration;
              document.getElementById('popup-facility').textContent = data.facility;
              
              let areaLabel = '📍 Area';
              if (bar.classList.contains('swim')) { areaLabel = '🏊 Pool'; }
              else if (bar.classList.contains('skate')) { areaLabel = '⛸️ Rink'; }
              else if (bar.classList.contains('climb')) { areaLabel = '🧗 Wall'; }
              
              document.getElementById('popup-area-label').textContent = areaLabel;
              document.getElementById('popup-pool').textContent = data.pool || '—';
              document.getElementById('popup-date').textContent = data.date;
              
              const conflictEl = document.getElementById('popup-conflict');
              if (data.conflict) {
                conflictEl.textContent = '⚠️ ' + data.conflict;
                conflictEl.style.display = 'block';
              } else {
                conflictEl.style.display = 'none';
              }
              
              document.getElementById('popup').classList.add('active');
            };
          });
          
          function closePopup() {
            document.getElementById('popup').classList.remove('active');
          }
          document.getElementById('popup').onclick = closePopup;
          </script>
          </body>
          </html>'''
          
          with open('docs/index.html', 'w', encoding='utf-8') as f:
              f.write(html)
          print(f"[done] Schedule rendered. Fresh: {fresh_count}/{total_days}, Cached: {cached_count}, Unavailable: {unavailable_count}")
          PYSCRIPT

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/sessions_cache.json
          git commit -m "chore: refresh drop-in schedule" || true
          git push origin main || true
