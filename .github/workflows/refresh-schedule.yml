name: Refresh Schedule

on:
  workflow_dispatch:
  schedule:
    - cron: '5 13 * * *'

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -q requests beautifulsoup4 lxml

      - name: Scrape and render
        run: |
          mkdir -p docs
          python3 << 'PYSCRIPT'
          import requests
          from bs4 import BeautifulSoup
          import datetime
          import re
          import html as html_escape
          
          BASE_URL = "https://looknbook.reddeer.ca/RedDeer/public/Category/ClassList"
          GUIDS = {
              "swim": "09d0604f-a42d-43a3-a93c-64a93ebda20c",
              "skate": "6f659e94-7b6a-4042-8c63-fbeba072256d",
              "climb": "654b289b-816d-443f-a84f-8f0cae322e54"
          }
          
          CATEGORIES = {
              "swim": {"label": "Swimming", "label_zh": "游泳", "color": "#2563eb"},
              "skate": {"label": "Skating / Arena", "label_zh": "冰场", "color": "#0891b2"},
              "climb": {"label": "Climbing & Bouldering", "label_zh": "攀岩", "color": "#ca8a04"}
          }
          
          SWIM_KEYWORDS = ("lane swimming", "public swimming", "public & lane", "adult & child swimming")
          
          class Session:
              def __init__(self, date, domain, name, time_raw, location, venue, spaces):
                  self.date = date
                  self.domain = domain
                  self.name = name
                  self.location = location
                  self.venue = venue
                  self.spaces = spaces
                  
                  parts = re.split(r'\s*[-–]\s*', time_raw.split('(')[0].strip(), maxsplit=1)
                  self.start_time = parts[0].strip() if len(parts) > 0 else ""
                  self.end_time = parts[1].strip() if len(parts) > 1 else ""
                  self.conflicts = []
              
              def start_min(self):
                  m = re.search(r'(\d+):(\d+)', self.start_time)
                  if not m: return 0
                  h, mn = int(m.group(1)), int(m.group(2))
                  if 'PM' in self.start_time and h != 12: h += 12
                  if 'AM' in self.start_time and h == 12: h = 0
                  return h * 60 + mn
              
              def end_min(self):
                  m = re.search(r'(\d+):(\d+)', self.end_time)
                  if not m: return 0
                  h, mn = int(m.group(1)), int(m.group(2))
                  if 'PM' in self.end_time and h != 12: h += 12
                  if 'AM' in self.end_time and h == 12: h = 0
                  return h * 60 + mn
          
          all_sessions = {}
          for domain, guid in GUIDS.items():
              for i in range(14):
                  d = (datetime.date.today() + datetime.timedelta(days=i)).isoformat()
                  url = f"{BASE_URL}?CategoryGUID={guid}&StartDate={d}&Participant=00000000-0000-0000-0000-000000000000"
                  try:
                      r = requests.get(url, timeout=15)
                      soup = BeautifulSoup(r.text, 'lxml')
                      table = soup.find('table')
                      if not table: continue
                      
                      for tr in table.find_all('tr')[1:]:
                          cells = tr.find_all('td')
                          if len(cells) < 7: continue
                          
                          time_raw = cells[0].text.strip()
                          name = cells[1].text.strip()
                          location = cells[3].text.strip()
                          venue = cells[4].text.strip()
                          spaces = cells[5].text.strip()
                          
                          if domain == "swim" and not any(k in name.lower() for k in SWIM_KEYWORDS):
                              continue
                          
                          if d not in all_sessions:
                              all_sessions[d] = {}
                          if domain not in all_sessions[d]:
                              all_sessions[d][domain] = []
                          
                          all_sessions[d][domain].append(Session(d, domain, name, time_raw, location, venue, spaces))
                  except Exception as e:
                      print(f"[warn] {domain} {d}: {e}")
          
          # Detect conflicts: ONLY cross-sport at same venue
          def detect_conflicts(sessions_by_domain):
              sports = list(sessions_by_domain.keys())
              for i, sport_a in enumerate(sports):
                  for sport_b in sports[i+1:]:
                      for sess_a in sessions_by_domain[sport_a]:
                          for sess_b in sessions_by_domain[sport_b]:
                              if sess_a.venue != sess_b.venue:
                                  continue
                              
                              a_s, a_e = sess_a.start_min(), sess_a.end_min()
                              b_s, b_e = sess_b.start_min(), sess_b.end_min()
                              
                              if a_e <= b_s:
                                  gap = b_s - a_e
                              elif b_e <= a_s:
                                  gap = a_s - b_e
                              else:
                                  gap = -(min(a_e, b_e) - max(a_s, b_s))
                              
                              if gap > 30: continue
                              kind = "overlap" if gap < 0 else "tight-transition"
                              sess_a.conflicts.append((sport_b, sess_b.name, sess_b.location, gap, kind))
                              sess_b.conflicts.append((sport_a, sess_a.name, sess_a.location, gap, kind))
          
          for d in all_sessions:
              detect_conflicts(all_sessions[d])
          
          # Generate HTML
          html = """<!doctype html>
          <html lang="en">
          <head>
          <meta charset="utf-8">
          <meta name="viewport" content="width=device-width, initial-scale=1">
          <title>Red Deer Drop-In Schedule</title>
          <style>
          :root {
            --bg: #0f172a; --panel: #1e293b; --panel-2: #0b1222;
            --text: #e2e8f0; --muted: #94a3b8; --border: #334155;
            --accent: #38bdf8;
            --swim: #2563eb; --skate: #0891b2; --climb: #ca8a04;
            --conflict: #ef4444;
          }
          * { box-sizing: border-box; }
          body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.4; }
          header { padding: 16px 24px; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; flex-wrap: wrap; gap: 16px; align-items: center; justify-content: space-between; }
          header h1 { margin: 0; font-size: 18px; }
          header .meta { color: var(--muted); font-size: 13px; }
          header .controls { display: flex; gap: 8px; flex-wrap: wrap; }
          .chip { padding: 6px 12px; border-radius: 999px; border: 1px solid var(--border); background: var(--panel-2); color: var(--text); font-size: 12px; cursor: pointer; user-select: none; }
          .chip.active { background: var(--accent); color: #0b1222; border-color: var(--accent); }
          main { padding: 16px 24px 48px; }
          
          .view { display: none; }
          .view.active { display: block; }
          
          /* List View */
          .day { margin-bottom: 20px; background: var(--panel); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
          .day-head { padding: 10px 16px; background: var(--panel-2); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: baseline; }
          .day-head .date { font-weight: 600; font-size: 15px; }
          .domain-row { display: grid; grid-template-columns: 150px 1fr; border-top: 1px solid var(--border); }
          .domain-row:first-child { border-top: none; }
          .domain-label { padding: 12px 16px; background: var(--panel-2); font-size: 13px; font-weight: 600; display: flex; flex-direction: column; gap: 2px; justify-content: center; border-right: 1px solid var(--border); }
          .domain-label .zh { font-size: 11px; color: var(--muted); font-weight: 400; }
          .domain-label.swim { border-left: 3px solid var(--swim); }
          .domain-label.skate { border-left: 3px solid var(--skate); }
          .domain-label.climb { border-left: 3px solid var(--climb); }
          .sessions { padding: 10px; display: flex; flex-wrap: wrap; gap: 8px; min-height: 48px; align-items: flex-start; }
          .session { display: flex; flex-direction: column; gap: 2px; padding: 8px 10px; border-radius: 6px; background: var(--panel-2); border: 1px solid var(--border); border-left-width: 3px; font-size: 12.5px; min-width: 220px; max-width: 320px; }
          .session.swim { border-left-color: var(--swim); }
          .session.skate { border-left-color: var(--skate); }
          .session.climb { border-left-color: var(--climb); }
          .session .time { font-weight: 600; }
          .session .name { color: var(--muted); font-size: 11.5px; }
          .session .loc { color: var(--text); font-size: 11.5px; opacity: 0.85; }
          .empty { color: var(--muted); font-style: italic; font-size: 12px; padding: 4px 6px; }
          
          /* Gantt View */
          .gantt-day { margin-bottom: 30px; }
          .gantt-day-title { font-weight: 600; font-size: 15px; margin-bottom: 16px; padding: 12px; background: var(--panel-2); border-radius: 8px; }
          .gantt-facility { margin-bottom: 20px; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
          .gantt-facility-name { padding: 12px 16px; background: var(--panel-2); border-bottom: 1px solid var(--border); font-weight: 600; font-size: 13px; }
          .gantt-sports { display: grid; grid-template-columns: 150px 1fr; }
          .gantt-sport { display: contents; }
          .gantt-sport-label { padding: 10px 16px; background: var(--panel); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); font-size: 12px; font-weight: 600; display: flex; align-items: center; }
          .gantt-sport-label.swim { color: var(--swim); }
          .gantt-sport-label.skate { color: var(--skate); }
          .gantt-sport-label.climb { color: var(--climb); }
          .gantt-timeline { padding: 10px; border-bottom: 1px solid var(--border); position: relative; height: 50px; background: var(--panel); display: flex; align-items: center; }
          .gantt-timeline:last-child { border-bottom: none; }
          .gantt-bar { position: absolute; height: 30px; top: 10px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.2); display: flex; align-items: center; font-size: 10px; color: white; padding: 0 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
          .gantt-bar.swim { background: var(--swim); }
          .gantt-bar.skate { background: var(--skate); }
          .gantt-bar.climb { background: var(--climb); }
          .gantt-bar.conflict { border: 2px solid var(--conflict); opacity: 0.9; }
          .gantt-time-axis { display: grid; grid-template-columns: 150px 1fr; margin-top: 10px; padding: 0 16px; }
          .gantt-hours { display: grid; grid-template-columns: repeat(16, 1fr); gap: 0; font-size: 10px; color: var(--muted); text-align: center; }
          .gantt-hour { padding: 4px 0; border-left: 1px solid var(--border); }
          
          footer { padding: 16px 24px; color: var(--muted); font-size: 11.5px; border-top: 1px solid var(--border); }
          body.hide-swim .domain-row.swim { display: none; }
          body.hide-skate .domain-row.skate { display: none; }
          body.hide-climb .domain-row.climb { display: none; }
          body.hide-swim .gantt-sport-label.swim { display: none; }
          body.hide-skate .gantt-sport-label.skate { display: none; }
          body.hide-climb .gantt-sport-label.climb { display: none; }
          body.hide-swim .gantt-sport-label.swim ~ .gantt-timeline { display: none; }
          body.hide-skate .gantt-sport-label.skate ~ .gantt-timeline { display: none; }
          body.hide-climb .gantt-sport-label.climb ~ .gantt-timeline { display: none; }
          </style>
          </head>
          <body>
          <header>
          <div>
          <h1>Red Deer Drop-In Schedule · 红鹿市公共活动时间表</h1>
          <div class="meta">Last updated: """ + datetime.datetime.now().strftime("%Y-%m-%d %H:%M") + """</div>
          </div>
          <div class="controls">
          <button class="chip active" data-view="list">📋 List</button>
          <button class="chip" data-view="gantt">📊 Gantt</button>
          <button class="chip active" data-toggle="swim">Swim</button>
          <button class="chip active" data-toggle="skate">Skate</button>
          <button class="chip active" data-toggle="climb">Climb</button>
          </div>
          </header>
          <main>
          
          <!-- LIST VIEW -->
          <div id="list-view" class="view active">
          """
          
          today = datetime.date.today().isoformat()
          for d in sorted(all_sessions.keys()):
              is_today = " today" if d == today else ""
              day_obj = datetime.datetime.fromisoformat(d).date()
              day_label = day_obj.strftime("%a, %b %d, %Y")
              
              html += f'<section class="day{is_today}"><div class="day-head"><span class="date">{day_label}</span></div>'
              
              for domain in ["swim", "skate", "climb"]:
                  items = all_sessions[d].get(domain, [])
                  if items:
                      cards = ""
                      for s in items:
                          cards += f'<div class="session {domain}"><span class="time">{s.start_time} – {s.end_time}</span><span class="name">{html_escape.escape(s.name)}</span><span class="loc">📍 {html_escape.escape(s.location)}</span></div>'
                  else:
                      cards = '<span class="empty">— no sessions —</span>'
                  
                  html += f'<div class="domain-row {domain}"><div class="domain-label {domain}"><span>{CATEGORIES[domain]["label"]}</span><span class="zh">{CATEGORIES[domain]["label_zh"]}</span></div><div class="sessions">{cards}</div></div>'
              
              html += '</section>'
          
          html += """</div>
          
          <!-- GANTT VIEW -->
          <div id="gantt-view" class="view">
          """
          
          for d in sorted(all_sessions.keys()):
              day_obj = datetime.datetime.fromisoformat(d).date()
              day_label = day_obj.strftime("%a, %b %d, %Y")
              
              html += f'<div class="gantt-day"><div class="gantt-day-title">{day_label}</div>'
              
              facilities = {}
              for domain in all_sessions[d]:
                  for s in all_sessions[d][domain]:
                      if s.venue not in facilities:
                          facilities[s.venue] = {}
                      if domain not in facilities[s.venue]:
                          facilities[s.venue][domain] = []
                      facilities[s.venue][domain].append(s)
              
              for venue in sorted(facilities.keys()):
                  html += f'<div class="gantt-facility"><div class="gantt-facility-name">{html_escape.escape(venue)}</div><div class="gantt-sports">'
                  
                  for domain in ["swim", "skate", "climb"]:
                      html += f'<div class="gantt-sport-label {domain}">{CATEGORIES[domain]["label"]}</div>'
                      sessions = facilities[venue].get(domain, [])
                      if sessions:
                          html += '<div class="gantt-timeline">'
                          for s in sessions:
                              start = s.start_min()
                              end = s.end_min()
                              width_pct = ((end - start) / (16 * 60)) * 100
                              left_pct = ((start - (6 * 60)) / (16 * 60)) * 100
                              conflict_cls = "conflict" if s.conflicts else ""
                              title = html_escape.escape(s.name)
                              html += f'<div class="gantt-bar {domain} {conflict_cls}" style="left: {left_pct}%; width: {width_pct}%;" title="{title}">{title}</div>'
                          html += '</div>'
                      else:
                          html += '<div class="gantt-timeline"></div>'
                  
                  html += '</div></div>'
              
              html += '</div>'
          
          html += """</div>
          </main>
          <footer>Toggle between List and Gantt views. ⚠️ Red borders = cross-sport conflicts within ±30 min at same facility.</footer>
          <script>
          document.querySelectorAll('[data-view]').forEach(function(btn) {
              btn.onclick = function() {
                  const view = btn.dataset.view;
                  document.querySelectorAll('[data-view]').forEach(function(b) { b.classList.remove('active'); });
                  btn.classList.add('active');
                  document.querySelectorAll('.view').forEach(function(v) { v.classList.remove('active'); });
                  document.getElementById(view + '-view').classList.add('active');
              };
          });
          document.querySelectorAll('[data-toggle]').forEach(function(btn) {
              btn.onclick = function() {
                  const key = btn.dataset.toggle;
                  btn.classList.toggle('active');
                  document.body.classList.toggle('hide-' + key, !btn.classList.contains('active'));
              };
          });
          </script>
          </body>
          </html>"""
          
          with open('docs/index.html', 'w', encoding='utf-8') as f:
              f.write(html)
          print(f"Schedule rendered: {len(all_sessions)} days")
          PYSCRIPT

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git commit -m "chore: refresh drop-in schedule" || true
          git push origin main || true
